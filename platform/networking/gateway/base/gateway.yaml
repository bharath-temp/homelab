apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: traefik
spec:
  gatewayClassName: traefik-gateway-class
  listeners:                        
    - name: http                    
      protocol: HTTP
      port: 8000    
      allowedRoutes:
        kinds:
          - kind: HTTPRoute         
        namespaces:
          from: All
    - name: https           
      protocol: HTTPS       
      port: 8443
      hostname: "*.beeslab.me"     
      tls:
        mode: Terminate     
        certificateRefs:    
          - name: beeslab-me-wildcard-tls
      allowedRoutes:        
        kinds:
          - kind: HTTPRoute
        namespaces:
          from: All
