apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: traefik
spec:
  gatewayClassName: traefik-gateway-class
  listeners:                        
    - name: http                    
      protocol: HTTP
      port: 8000    
      allowedRoutes:
        kinds:
          - kind: HTTPRoute         
        namespaces:
          from: All
