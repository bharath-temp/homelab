# helm controller working with source controller to install longhor
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: "5h" # drift of helm created resources
  driftDetection:
    mode: enabled
  releaseName: longhorn
  
  # shortcut path in reality it's creating a flux HelmChart CR
  chart: 
    spec:
      chart: longhorn
      version: "1.11.x"
      interval: "5h" # checking new chart version from source
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  values:
    httproute:
      enabled: true
      parentRefs:
        - name: main
          namespace: traefik
          sectionName: http
        - name: main
          namespace: traefik
          sectionName: https
      hostnames:
        - longhorn.beeslab.me
      path: /
      pathType: PathPrefix
    defaultSettings:
      createDefaultDiskLabeledNodes: true
      defaultDataPath: "/var/mnt/longhornfast"
      defaultReplicaCount: 2
