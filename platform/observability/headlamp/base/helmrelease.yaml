# helm controller working with source controller to install longhor
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp-system
spec:
  interval: "5h" # drift of helm created resources
  driftDetection:
    mode: enabled
  releaseName: headlamp
  
  # shortcut path in reality it's creating a flux HelmChart CR
  chart: 
    spec:
      chart: headlamp
      version: "0.x"
      interval: "5h" # checking new chart version from source
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp-system
  valuesFrom:
    - kind: Secret
      name: headlamp-app-secrets
      valuesKey: OAUTH2_CLIENT_SECRET
      targetPath: config.oidc.clientSecret

  values:
    config:
      oidc:
        clientID: "373858034687934740"
        issuerURL: "https://zitadel.beeslab.me"
        scopes: "openid profile email"

    httpRoute:
      enabled: true
      parentRefs:
        - name: main
          namespace: traefik
          sectionName: https-internal
      hostnames:
        - headlamp.internal.beeslab.me
#      rules:
#        path: /
#        pathType: PathPrefix

    pluginsManager:
      enabled: true
      configContent: |
        plugins:
          - name: headlamp_flux
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_flux
            version: 0.6.0
          - name: headlamp_cert-manager
            source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
            version: 0.1.0
        installOptions:
          parallel: true

