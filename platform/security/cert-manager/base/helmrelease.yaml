apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: "5h" # drift of helm created resources
  driftDetection:
    mode: enabled
  releaseName: cert-manager

  # shortcut path in reality it's creating a flux HelmChart CR
  chart: 
    spec:
      chart: cert-manager
      version: "1.20.x"
      interval: "5h" # checking new chart version from source
      sourceRef:
        kind: HelmRepository
        name: cert-manager
        namespace: cert-manager
  values:
    replicaCount: 1
    crds:
      enabled: true
