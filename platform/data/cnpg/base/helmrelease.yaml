# helm controller working with source controller to install longhor
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  interval: "5h" # drift of helm created resources
  driftDetection:
    mode: enabled
  releaseName: cnpg
  
  # shortcut path in reality it's creating a flux HelmChart CR
  chart: 
    spec:
      chart: cloudnative-pg
      version: "1.29.x"
      interval: "5h" # checking new chart version from source
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
  values:
    replicaCount: 1

