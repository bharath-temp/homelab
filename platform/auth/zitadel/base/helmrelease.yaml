apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zitadel
  namespace: zitadel
spec:
  interval: "5h" # drift of helm created resources
  driftDetection:
    mode: enabled
  releaseName: zitadel

  # shortcut path in reality it's creating a flux HelmChart CR
  chart: 
    spec:
      chart: zitadel
      version: "9.x"
      interval: "5h" # checking new chart version from source
      sourceRef:
        kind: HelmRepository
        name: zitadel
        namespace: zitadel
  valuesFrom:
    - kind: Secret
      name: zitadel-values
      valuesKey: values.yaml
  values:
    replicaCount: 1

    postgresql:
      enabled: false

    ingress:
      enabled: false

    login:
      enabled: false
      ingress:
        enabled: false
      gateway:
        httpRoute:
          enabled: false
          hostnames:
            - zitadel.beeslab.me
          parentRefs:
            - name: main
              namespace: traefik
              sectionName: http

    gateway:
      httpRoute:
        enabled: true
        hostnames:
          - zitadel.beeslab.me
        parentRefs:
          - name: main
            namespace: traefik
            sectionName: http

    service:
      type: ClusterIP
      port: 8080
      protocol: http2
      appProtocol: kubernetes.io/h2c

    zitadel:
      configmapConfig:
        ExternalDomain: zitadel.beeslab.me
        ExternalPort: 443
        ExternalSecure: true

        TLS:
          Enabled: false

        Database:
          Postgres:
            Host: zitadel-postgres-rw.zitadel.svc.cluster.local
            Port: 5432
            Database: zitadel
            MaxOpenConns: 10
            MaxIdleConns: 5
            MaxConnLifetime: 30m
            MaxConnIdleTime: 5m
            User:
              Username: zitadel
              SSL:
                Mode: disable
            Admin:
              Username: postgres
              SSL:
                Mode: disable
