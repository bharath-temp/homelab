---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn-node-labels
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./platform/storage/longhorn-node-labels/homelab

  # Safety: apply labels to existing cluster-owned Node
  # objects without pruning them if manifests are later removed.
  prune: false
  sourceRef:
    kind: GitRepository
    name: flux-system
