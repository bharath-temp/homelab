apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: memos-postgres
  namespace: memos
spec:
  instances: 1
  enableSuperuserAccess: true 
  storage:
    size: 10Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: memos
      owner: memos
      secret:
        name: memos-postgres-owner
