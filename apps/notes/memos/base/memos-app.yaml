---
apiVersion: v1
kind: ConfigMap
metadata:
  name: memos-config
  namespace: memos
data:
  MEMOS_DRIVER: "postgres"
  MEMOS_PORT: "8080"
  MEMOS_INSTANCE_URL: "https://memos.beeslab.me"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memos
  namespace: memos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: memos
  template:
    metadata:
      labels:
        app: memos
    spec:
      containers:
        - name: memos
          image: memos/memos:stable
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: memos-config
            - secretRef:
                name: memos-app-secrets
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: memos
  namespace: memos
spec:
  selector:
    app: memos
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
