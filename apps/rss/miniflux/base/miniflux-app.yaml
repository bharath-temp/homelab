---
apiVersion: v1
kind: ConfigMap
metadata:
  name: miniflux-config
  namespace: miniflux
data:
  RUN_MIGRATIONS: "1"
  CREATE_ADMIN: "1"
  OAUTH2_PROVIDER: "oidc"
  OAUTH2_USER_CREATION: "1"
  OAUTH2_OIDC_DISCOVERY_URL: "https://zitadel.beeslab.me/.well-known/openid-configuration"
  OAUTH2_REDIRECT_URL: "https://miniflux.beeslab.me/oauth2/oidc/callback"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: miniflux
  namespace: miniflux
spec:
  replicas: 1
  selector:
    matchLabels:
      app: miniflux
  template:
    metadata:
      labels:
        app: miniflux
    spec:
      containers:
        - name: miniflux
          image: miniflux/miniflux:2.2.19
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: miniflux-config
            - secretRef:
                name: miniflux-app-secrets
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: miniflux
  namespace: miniflux
spec:
  selector:
    app: miniflux
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
