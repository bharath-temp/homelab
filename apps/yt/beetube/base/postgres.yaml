apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: beetube-postgres
  namespace: beetube
spec:
  instances: 1
  enableSuperuserAccess: true 
  storage:
    size: 15Gi
    storageClass: longhorn
  bootstrap:
    initdb:
      database: beetube
      owner: beetube
      secret:
        name: beetube-postgres-owner
